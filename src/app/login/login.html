<div class="login-container">
  <div class="login-card">
    <h2 class="login-title">Logowanie</h2>

    <form #loginForm="ngForm" class="login-form">
      <div class="form-group">
        <label for="username">Login</label>
        <input
          type="text"
          id="username"
          name="username"
          [(ngModel)]="username"
          required
          class="login-input"
          placeholder="Wpisz login"
          autocomplete="username"
        />
      </div>

      <div class="form-group">
        <label for="password">Hasło</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          required
          class="login-input"
          placeholder="Wpisz hasło"
          autocomplete="current-password"
        />
      </div>

      <div class="login-actions">
        <button
          type="button"
          class="login-btn login-btn--primary"
          (click)="onLogin()"
          [disabled]="loginForm.invalid"
        >
          Zaloguj się
        </button>

        <button
          type="button"
          class="login-btn login-btn--secondary"
          (click)="onRegister()"
          [disabled]="loginForm.invalid"
        >
          Zarejestruj się
        </button>
      </div>
    </form>
  </div>
</div>
